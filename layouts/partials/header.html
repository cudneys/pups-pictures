<header class="site-header">
  <div class="container">
    <a href="{{ "/" | relURL }}" class="site-logo">
      <svg class="logo-mark" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="11" cy="13" r="3" fill="currentColor"/>
        <circle cx="18" cy="10" r="3" fill="currentColor"/>
        <circle cx="25" cy="13" r="3" fill="currentColor"/>
        <circle cx="29" cy="20" r="2.6" fill="currentColor"/>
        <path d="M18 17c-3.5 0-6.5 2.6-7.4 5.8-.6 2.1 1 4.2 3.2 4.2 1.3 0 2.4-.6 4.2-.6s2.9.6 4.2.6c2.2 0 3.8-2.1 3.2-4.2C24.5 19.6 21.5 17 18 17z" fill="currentColor"/>
      </svg>
      <span class="logo-text">{{ .Site.Title }}</span>
    </a>
    <nav class="site-nav">
      <a href="{{ "/" | relURL }}" {{ if .IsHome }}class="active"{{ end }}>Galleries</a>
      <a href="https://cookbook.this-old.dad/">Cookbook</a>
      <a href="https://cudneys.net/">Home</a>
    </nav>
    <button class="nav-toggle" aria-label="Toggle menu" onclick="this.closest('.site-header').classList.toggle('nav-open')">
      <span></span><span></span><span></span>
    </button>
  </div>
</header>
